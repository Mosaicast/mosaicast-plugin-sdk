name: 🐞 Bug Report
description: Report a bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please check first whether the bug already has an issue.
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Which version or commit SHA?
    validations:
      required: false
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Optional, but helpful.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options: [core, plugin-sdk, plugin-bingo, plugin-stats, plugin-wiki, sample, unsure]
    validations:
      required: false
