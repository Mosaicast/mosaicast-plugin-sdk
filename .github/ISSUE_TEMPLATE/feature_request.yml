name: 💡 Feature / idea
description: Suggest a feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the need, not the solution directly.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: false
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options: [Plugin idea, Core feature, Developer experience (DX), Docs, Other]
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / context
    validations:
      required: false
