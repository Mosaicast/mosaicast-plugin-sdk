# Copy to: .github/workflows/license-header.yml  (in EVERY repo)
# Checks that source files CHANGED IN THIS PR carry an SPDX-License-Identifier at the top.
# (Changed-files-only, so a legacy violation elsewhere never blocks an unrelated PR.)
# Merge blocker like DCO: set the "License Headers" check as required in branch protection.
# Self-contained (only actions/checkout) — no external action pin needed.
name: License Headers

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  spdx:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check SPDX-License-Identifier in changed source files
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # Added/copied/modified/renamed source files in this PR only.
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$base".."$head" -- \
            '*.java' '*.kt' '*.ts' '*.tsx' '*.js' '*.jsx' \
            | grep -vE '(^|/)(node_modules|build|dist|out|target|\.gradle)/' || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No source files changed. ✅"; exit 0
          fi
          missing=0
          for f in "${files[@]}"; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            if ! head -n 15 "$f" | grep -q 'SPDX-License-Identifier:'; then
              echo "::error file=$f::Missing SPDX-License-Identifier header"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Every changed source file needs an SPDX header at the top, e.g.:"
            echo "  // SPDX-License-Identifier: AGPL-3.0-or-later   (core, bingo, stats, wiki)"
            echo "  // SPDX-License-Identifier: Apache-2.0          (sdk, sample)"
            echo "Auto-insert: pipx install reuse && reuse annotate --license <ID> --copyright \"<HOLDER>\" <file>"
            exit 1
          fi
          echo "All changed source files have an SPDX header. ✅"
