# OpenSSF Scorecard — supply-chain / security-posture analysis.
# Publishes results to the public OpenSSF API (so the README badge resolves) and uploads SARIF to
# GitHub code scanning. Runs weekly and on pushes to master.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '27 3 * * 1'   # Mondays 03:27 UTC
  push:
    branches: [master]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to code scanning
      id-token: write          # OIDC, required to publish results to the OpenSSF API
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true   # required for the api.scorecard.dev badge

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
