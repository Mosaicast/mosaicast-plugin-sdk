# Copy to: .github/workflows/dco.yml  (in EVERY repo)
# Checks on every PR that all commits carry a valid `Signed-off-by:` line (DCO).
# To make it a real merge BLOCKER, also in repo settings:
#   Settings → Branches → branch protection rule for `main` →
#   "Require status checks to pass before merging" → select the "DCO" check.
name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dco:
    name: DCO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check Signed-off-by on all PR commits
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for c in $(git rev-list "$base".."$head"); do
            # skip merge commits (more than one parent)
            if [ "$(git rev-list --parents -n 1 "$c" | wc -w)" -gt 2 ]; then
              continue
            fi
            if ! git show -s --format=%B "$c" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $c has no valid Signed-off-by line (DCO)."
              git show -s --format='  %h %s' "$c"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "DCO check failed."
            echo "Sign a commit:       git commit -s"
            echo "Fix the last one:    git commit --amend -s --no-edit && git push --force-with-lease"
            echo "Fix several:         git rebase --signoff <base>  (e.g. origin/main)"
            exit 1
          fi
          echo "All commits signed off. ✅"
